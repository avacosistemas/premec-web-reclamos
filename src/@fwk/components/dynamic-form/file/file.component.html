<div class="w-full flex flex-col gap-3">
    <label *ngIf="field?.label" class="block text-sm font-medium text-secondary">
        {{ field.label }} <span *ngIf="field.required" class="text-red-500">*</span>
    </label>

    <input type="file" #fileInput [accept]="acceptTypes" (change)="onFileChange($event)" class="hidden"
        [disabled]="isDisabled" [multiple]="isMultiple">

    <div class="flex flex-wrap gap-4 mb-2" *ngIf="files.length > 0">
        <div *ngFor="let file of files; let i = index"
            class="relative group w-24 h-24 rounded-lg border-2 border-gray-200 dark:border-gray-700 overflow-hidden bg-gray-50 dark:bg-gray-800 shadow-sm transition-all hover:shadow-md">

            <img [src]="'data:image/jpeg;base64,'+file.base64" class="w-full h-full object-cover" *ngIf="file.base64">

            <div class="flex items-center justify-center w-full h-full text-gray-400" *ngIf="!file.base64">
                <mat-icon svgIcon="heroicons_outline:document"></mat-icon>
            </div>

            <button *ngIf="!isDisabled"
                class="absolute top-1 right-1 w-6 h-6 flex items-center justify-center rounded-full bg-red-500 text-white opacity-0 group-hover:opacity-100 transition-opacity shadow-sm hover:bg-red-600"
                (click)="removeFile(i, $event)" matTooltip="Quitar">
                <mat-icon class="icon-size-4" svgIcon="heroicons_outline:x-mark"></mat-icon>
            </button>

            <div
                class="absolute bottom-0 left-0 right-0 bg-black/50 text-[10px] text-white px-1 py-0.5 truncate text-center opacity-0 group-hover:opacity-100 transition-opacity">
                {{ file.name }}
            </div>
        </div>
    </div>

    <div *ngIf="!isDisabled && (isMultiple ? files.length < (field.options?.maxFiles || 3) : files.length === 0)"
        class="relative group w-full min-h-[100px] rounded-xl border-2 border-dashed transition-all duration-200 ease-in-out cursor-pointer"
        [ngClass]="{
            'border-accent-500 bg-accent-50/50 dark:bg-accent-900/20': isDragging,
            'border-gray-300 dark:border-gray-600 hover:border-accent-400 hover:bg-gray-50 dark:hover:bg-gray-800': !isDragging && !hasErrorMessage && !errorMessage,
            'border-red-500 bg-red-50 dark:bg-red-900/10': hasErrorMessage || errorMessage
         }" (click)="triggerFileInput()">

        <div *ngIf="isLoading"
            class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/90 dark:bg-gray-900/90 backdrop-blur-sm p-6">
            <mat-progress-bar mode="indeterminate" class="w-full max-w-[200px] rounded-full"></mat-progress-bar>
            <span class="mt-3 text-xs font-bold text-accent-600 uppercase tracking-wider">Cargando...</span>
        </div>

        <div class="flex flex-col items-center justify-center py-6 px-4 text-center h-full">
            <div class="text-accent-600 group-hover:scale-110 transition-transform">
                <mat-icon class="icon-size-6" svgIcon="heroicons_outline:photo"></mat-icon>
            </div>
            <div class="text-sm font-medium text-gray-600 dark:text-gray-300">
                <span class="text-accent-600 font-semibold hover:underline">Sube fotos</span> o arrastra aquí
            </div>
            <p class="text-xs text-gray-400 mt-1">
                Hasta {{ field.options?.maxFiles || 3 }} imágenes.
            </p>
        </div>
    </div>

    <div *ngIf="hasErrorMessage || errorMessage" class="text-xs text-red-500 ml-1">
        {{ hasErrorMessage || errorMessage }}
    </div>
</div>
